{% extends "base.html" %}

{% block content %}
<!-- Fond sombre pour l'index des projets -->
<!-- En-tête : Titre + Filtres -->
<section class="max-w-7xl mx-auto px-6 mb-20 text-center">
    <h1 class="font-display text-5xl md:text-7xl uppercase mb-12">
        <span class="block italic">Mon index</span>
        <span class="block">de projets</span>
    </h1>

    <!-- Barre de filtres corrigée (sans l'effet d'étirement) -->
    <div class="flex flex-wrap justify-center items-center text-[10px] uppercase font-semibold tracking-widest">
        <button class="bg-white text-black px-6 py-4 border border-white hover:bg-gray-200 transition-colors">Tout</button>
        <button class="px-6 py-4 border border-white/20 hover:bg-white/10 transition-colors md:-ml-[1px]">Sites Web</button>
        <button class="px-6 py-4 border border-white/20 hover:bg-white/10 transition-colors md:-ml-[1px]">Édition</button>
        <button class="px-6 py-4 border border-white/20 hover:bg-white/10 transition-colors md:-ml-[1px]">Motion Design</button>
    </div>
</section>

<!-- Liste des projets (Structure flexbox renforcée) -->
<section class="max-w-6xl mx-auto px-6">
    <div class="border-t border-white/20">

        <!-- Projet 1 -->
        <a href="#" class="group flex flex-col md:flex-row md:items-center justify-between border-b border-white/20 py-6 md:py-8 hover:bg-white/5 transition-colors md:px-4">

            <!-- Gauche : Année + Titre -->
            <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-12">
                <span class="font-sans text-sm text-gray-400 group-hover:text-white transition-colors hidden md:block">2024</span>
                <h2 class="font-display text-3xl md:text-4xl group-hover:italic transition-all flex items-baseline gap-4 flex-wrap">
                    Monographie Architecturale
                    <span class="font-sans text-xs md:text-sm uppercase tracking-widest text-gray-500 font-normal not-italic group-hover:text-gray-300">Livre</span>
                </h2>
            </div>

            <!-- Droite : Catégorie + Flèche -->
            <div class="flex items-center justify-between md:justify-end gap-6 mt-6 md:mt-0 w-full md:w-auto">
                <span class="font-sans text-[11px] uppercase tracking-widest text-gray-400 group-hover:text-white transition-colors text-left">Direction Artistique</span>

                <div class="w-10 h-10 flex-shrink-0 bg-white text-black flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </div>
        </a>

        <!-- Projet 2 (Exemple avec un titre long comme dans ta capture) -->
        <a href="#" class="group flex flex-col md:flex-row md:items-center justify-between border-b border-white/20 py-6 md:py-8 hover:bg-white/5 transition-colors md:px-4">
            <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-12">
                <span class="font-sans text-sm text-gray-400 group-hover:text-white transition-colors hidden md:block">2023</span>
                <h2 class="font-display text-3xl md:text-4xl group-hover:italic transition-all flex items-baseline gap-4 flex-wrap">
                    Cenotaph Newton VR
                    <span class="font-sans text-xs md:text-sm uppercase tracking-widest text-gray-500 font-normal not-italic group-hover:text-gray-300">Master 1</span>
                </h2>
            </div>
            <div class="flex items-center justify-between md:justify-end gap-6 mt-6 md:mt-0 w-full md:w-auto">
                <span class="font-sans text-[11px] uppercase tracking-widest text-gray-400 group-hover:text-white transition-colors text-left">Réalité Virtuelle</span>
                <div class="w-10 h-10 flex-shrink-0 bg-white text-black flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </div>
        </a>

    </div>
</section>
{% endblock content %}
