{% extends "base.html" %}

{% block content %}

<section class="relative min-h-screen overflow-hidden px-6 md:px-10 pt-28 md:pt-36 pb-20">

        </div>

        <div class="reveal lg:col-span-5 lg:col-start-8" style="transition-delay: .1s;">

                    </span>

                    <span>

                        <span class="mt-3 block text-2xl sm:text-3xl font-medium tracking-[-0.02em] group-hover:text-coral">
                            n.ouattara@myskolae.fr
                        </span>
                    </span>
                </a>

                <a href="https://www.google.com/maps/search/?api=1&query=Villiers-sur-Marne%2C%20France" target="_blank" rel="noopener noreferrer" class="group grid grid-cols-[5rem_1fr] gap-6">

                        <span class="mt-3 block text-2xl sm:text-3xl font-medium tracking-[-0.02em] group-hover:text-yellow-500">
                            Villiers sur Marne, France
                        </span>
                    </span>
                </a>

                <a href="tel:+33 6 56 67 92 17" class="group grid grid-cols-[5rem_1fr] gap-6">

                        <svg aria-hidden="true" class="h-10 w-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

                    <span>

                        <span class="mt-3 block text-2xl sm:text-3xl font-medium tracking-[-0.02em] group-hover:text-violet">
                            +33 6 56 67 92 17
