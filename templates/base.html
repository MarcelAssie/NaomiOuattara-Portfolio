{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naomi Ouattara — Visual Designer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#F7F2E8',
                        ink: '#111111',
                        coral: '#FF4D2E',
                        lime: '#C8FF2E',
                        violet: '#6C4DFF',
                        sky: '#7AE7FF',
                        muted: '#6F6A63'
                    },
                    fontFamily: {
                        display: ['Syne', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: #F7F2E8;
            color: #111111;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 77, 46, 0.18), transparent 26%),
                radial-gradient(circle at 85% 10%, rgba(200, 255, 46, 0.22), transparent 22%),
                radial-gradient(circle at 75% 80%, rgba(108, 77, 255, 0.16), transparent 30%);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.04;
            background-image: linear-gradient(#111 1px, transparent 1px),
                              linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 42px 42px;
        }

        main, nav, footer {
            position: relative;
            z-index: 2;
        }

        .reveal {
            opacity: 0;
            transform: translateY(32px) rotate(-1deg);
            transition: all 0.8s cubic-bezier(.16, 1, .3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0) rotate(0);
        }

        .nav-pill {
            border: 1px solid #111;
            border-radius: 999px;
            padding: 0.55rem 1rem;
            background: rgba(247, 242, 232, 0.72);
            backdrop-filter: blur(12px);
            transition: all 0.25s ease;
        }

        .nav-pill:hover {
            background: #111;
            color: #F7F2E8;
            transform: translateY(-2px);
        }

        .blob {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
        }

        @keyframes morph {
            0%, 100% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }
            50% {
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
            }
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
    </style>
</head>

<body class="font-body selection:bg-coral selection:text-paper">

    <nav class="fixed top-0 left-0 w-full z-50 px-5 md:px-8 py-5 flex justify-between items-center">
        <a href="{% url 'welcome' %}" class="font-display font-extrabold text-xl md:text-2xl tracking-tight">
            NAOMI<span class="text-coral">●</span>
        </a>

        <ul class="hidden md:flex items-center gap-3 text-xs uppercase tracking-[0.12em] font-semibold">
            <li><a class="nav-pill" href="{% url 'about' %}">À propos</a></li>
            <li><a class="nav-pill" href="{% url 'projects' %}">Projets</a></li>
            <li><a class="nav-pill bg-lime" href="mailto:naomi@email.com">Contact</a></li>
        </ul>

        <a href="{% url 'projects' %}" class="md:hidden nav-pill text-xs uppercase font-semibold">
            Menu
        </a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="px-6 md:px-10 py-8 border-t border-ink/20">
        <div class="flex flex-col md:flex-row justify-between gap-4 text-xs uppercase tracking-[0.12em] font-semibold">
            <span>© 2026 Naomi Ouattara</span>
            <span>Visual Design / Print / Digital</span>
            <span>Paris, France</span>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.12 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
