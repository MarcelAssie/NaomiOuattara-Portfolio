{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naomi Ouattara — Graphic Designer</title>
    <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}"/>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#F7F2E8',
                        ink: '#111111',
                        coral: '#FF4D2E',
                        lime: '#C8FF2E',
                        violet: '#6C4DFF',
                        sky: '#7AE7FF',
                        muted: '#6F6A63'
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* Base layout & theme */
        html { scroll-behavior: smooth; }
        body { background: #F7F2E8; color: #111111; overflow-x: hidden; -webkit-text-size-adjust: 100%; }

        /* Safer wrapping for narrow screens */
        h1, h2, h3, p, li, a, button { overflow-wrap: anywhere; }

        /* Decorative background gradients */
        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 77, 46, 0.18), transparent 26%),
                radial-gradient(circle at 85% 10%, rgba(200, 255, 46, 0.22), transparent 22%),
                radial-gradient(circle at 75% 80%, rgba(108, 77, 255, 0.16), transparent 30%);
        }
        body::after {
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.04;
            background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 42px 42px;
        }

        main, nav, footer { position: relative; z-index: 2; }

        /* Reveal animation for content */
        .reveal { opacity: 0; transform: translateY(32px) rotate(-1deg); transition: all 0.8s cubic-bezier(.16,1,.3,1); }
        .reveal.visible { opacity: 1; transform: translateY(0) rotate(0); }

        /* Small UI elements */
        .nav-pill { border: 1px solid #111; border-radius: 999px; padding: 0.55rem 1rem; background: rgba(247,242,232,0.72); backdrop-filter: blur(12px); transition: all .25s ease; }
        .nav-pill:hover { background:#111; color:#F7F2E8; transform: translateY(-2px); }
        .nav-pill.active { background:#C8FF2E; color:#111; border-color:#111; opacity:1; }

        .blob { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; animation: morph 8s ease-in-out infinite; }
        @keyframes morph { 0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; } 50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; } }
        @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

        /* Responsive nav and mobile menu */
        nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:.6rem 0.8rem;gap:1rem;background:rgba(247,242,232,0.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(13,13,13,0.08);box-shadow:0 8px 28px rgba(0,0,0,0.05);transition:background .25s ease,border-color .25s ease,box-shadow .25s ease,backdrop-filter .25s ease}
        nav.home-top{background:transparent;backdrop-filter:blur(0);border-bottom-color:transparent;box-shadow:none}
        .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.15em;color:#111;text-decoration:none;opacity:1;pointer-events:auto;transition:opacity .25s ease,color .25s ease}
        nav.home-top .nav-logo{opacity:0;pointer-events:none}
        .nav-links{display:flex;gap:1rem;list-style:none;align-items:center}
        .nav-links a{position:relative;display:inline-flex;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:#111;text-decoration:none;opacity:.86;transition:opacity .2s,color .25s ease}
        .nav-links a::after{content:"";position:absolute;left:-.12rem;right:-.12rem;bottom:-.18rem;height:.16rem;background:#FF4D2E;border-radius:999px;z-index:-1;transform:scaleX(0);transform-origin:left;opacity:.8;transition:transform .28s cubic-bezier(.16,1,.3,1),opacity .25s ease}
        .nav-links a:hover,.nav-links a.active{opacity:1}
        .nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1)}

        /* mobile menu components */
        .mobile-nav-toggle{display:none;align-items:center;justify-content:center;width:44px;height:40px;border-radius:8px;border:1px solid rgba(13,13,13,0.08);background:transparent}
        .mobile-nav{display:none;position:fixed;inset:56px 0 0 0;background:#F7F2E8;z-index:95;padding:.75rem 1rem;border-top:1px solid rgba(13,13,13,0.04);overflow:auto}
        .mobile-nav a{display:block;padding:.75rem 1rem;border-bottom:1px solid rgba(13,13,13,0.03);color:#111;text-decoration:none}
        .mobile-nav a.active{background:#C8FF2E;color:#111;font-weight:600}

        /* Footer spacing on small screens */
        footer{display:flex;justify-content:space-between;align-items:center;padding:1rem 1rem;background:#111;border-top:1px solid rgba(245,240,232,.1);font-size:.6rem;letter-spacing:.15em;color:rgba(245,240,232,.3)}

        /* Section inner spacing */
        .section-inner{max-width:1400px;margin:0 auto;padding:5rem 1.25rem}

        /* Responsive breakpoints */
        @media (max-width:1024px){
            .nav-links{display:none}
            .mobile-nav-toggle{display:inline-flex}
            .section-inner{padding:3rem 1rem}
            footer{flex-direction:column;align-items:flex-start;gap:.5rem}
        }
        @media (min-width:1025px){
            .mobile-nav{display:none !important}
            .mobile-nav-toggle{display:none}
        }
        @media (max-width:640px){
            nav{padding:.45rem .6rem}
            .nav-logo{font-size:.95rem}
            .mobile-nav{inset:52px 0 0 0}
            .section-inner{padding:2.25rem .9rem}
            footer{padding:.9rem .9rem}
        }
    </style>
</head>

<body class="font-body selection:bg-coral selection:text-paper">

    <nav class="fixed top-0 left-0 w-full z-50">
        <div class="max-w-screen-2xl mx-auto w-full px-5 md:px-8 py-3 flex items-center justify-between">
            <a href="{% url 'welcome' %}" class="font-display font-extrabold text-lg md:text-2xl tracking-tight nav-logo">NAOMI<span class="text-coral">●</span></a>

            <ul class="nav-links hidden md:flex items-center gap-3 text-xs uppercase tracking-[0.12em] font-semibold">
                <li><a class="" data-nav="about" href="{% url 'about' %}">À propos</a></li>
                <li><a class="" data-nav="projects" href="{% url 'projects' %}">Projets</a></li>
                <li><a class="" data-nav="cv" href="{% url 'cv' %}">Mon CV</a></li>
                <li><a class="" data-nav="contact" href="{% url 'contact' %}">Contact</a></li>
            </ul>

            <button id="mobileNavToggle" class="mobile-nav-toggle md:hidden" aria-expanded="false" aria-controls="mobileNav" aria-label="Ouvrir le menu">☰</button>
        </div>

        <div id="mobileNav" class="mobile-nav md:hidden" aria-hidden="true">
            <a data-nav="about" href="{% url 'about' %}">À propos</a>
            <a data-nav="projects" href="{% url 'projects' %}">Projets</a>
            <a data-nav="cv" href="{% url 'cv' %}">Mon CV</a>
            <a data-nav="contact" href="{% url 'contact' %}">Contact</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer id="contact" class="w-full px-6 md:px-10 py-8 border-t border-ink/20">
        <div class="flex w-full flex-col items-center justify-center gap-3 md:flex-row md:gap-10 text-xs uppercase tracking-[0.12em] font-semibold text-center">
            <a href="{% url 'dashboard' %}" class="hover:underline underline-offset-4">© 2026 Naomi Ouattara</a>
            <span>Designer / Print / Digital</span>
            <span>Paris, France</span>
        </div>
    </footer>

    <script>
        // Reveal on scroll
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Mobile nav toggle
        (function(){
            const btn = document.getElementById('mobileNavToggle');
            const nav = document.getElementById('mobileNav');
            if(!btn || !nav) return;
            let open = false;
            btn.addEventListener('click', ()=>{
                open = !open;
                btn.setAttribute('aria-expanded', String(open));
                nav.style.display = open ? 'block' : 'none';
                nav.setAttribute('aria-hidden', String(!open));
            });
            // Close when clicking outside
            document.addEventListener('click', e=>{
                if(!open) return;
                if(nav.contains(e.target) || btn.contains(e.target)) return;
                open = false; btn.setAttribute('aria-expanded','false'); nav.style.display='none'; nav.setAttribute('aria-hidden','true');
            });
            // respect resize: hide mobile nav when resizing to desktop
            window.addEventListener('resize', ()=>{ if(window.innerWidth>1024){ nav.style.display='none'; nav.setAttribute('aria-hidden','true'); btn.setAttribute('aria-expanded','false'); open=false } });
        })();

        // On the homepage only, reveal navbar background and logo after scroll
        (function(){
            const nav = document.querySelector('nav');
            if(!nav) return;
            const isHomepage = window.location.pathname === '/' || window.location.pathname === '';

            if(!isHomepage) {
                nav.classList.remove('home-top');
                return;
            }

            function updateNavbarState(){
                nav.classList.toggle('home-top', window.scrollY <= 8);
            }

            updateNavbarState();
            window.addEventListener('scroll', updateNavbarState, { passive: true });
        })();

        // Active nav state (about / projects / contact)
        (function(){
            const navItems = document.querySelectorAll('[data-nav]');
            if(!navItems.length) return;

            function updateActiveNav(){
                const path = window.location.pathname.toLowerCase();
                const hash = window.location.hash.toLowerCase();
                let activeKey = '';

                if(path.includes('/cv')) {
                    activeKey = 'cv';
                } else if(path.includes('/contact')) {
                    activeKey = 'contact';
                } else if(path.includes('/about')) {
                    activeKey = 'about';
                } else if(path.includes('/projects')) {
                    activeKey = 'projects';
                }

                navItems.forEach(el => {
                    const isActive = el.getAttribute('data-nav') === activeKey;
                    el.classList.toggle('active', isActive);
                    if (isActive) {
                        el.setAttribute('aria-current', 'page');
                    } else {
                        el.removeAttribute('aria-current');
                    }
                });
            }

            updateActiveNav();
            window.addEventListener('hashchange', updateActiveNav);
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
