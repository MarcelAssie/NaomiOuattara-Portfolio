{% extends "base.html" %}

{% block content %}

<section class="px-6 md:px-10 pt-32 pb-24 max-w-5xl mx-auto">

    <div class="mb-16">
        <p class="text-xs uppercase tracking-[0.18em] font-bold mb-4">
            Dashboard
        </p>

        <h1 class="font-display text-6xl md:text-8xl font-extrabold tracking-[-0.08em] leading-none">
            Catégories
        </h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">

        <div class="border-2 border-ink rounded-[2rem] p-8 bg-lime shadow-[6px_6px_0_#111]">

            <h2 class="font-display text-3xl font-extrabold mb-10">
                Nouvelle catégorie
            </h2>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-xs uppercase font-bold mb-3">
                        Nom
                    </label>

                    {{ form.name }}
                </div>

                <button type="submit"
                        class="bg-ink text-paper rounded-full px-6 py-4 text-xs uppercase tracking-[0.16em] font-bold">
                    Ajouter
                </button>

            </form>

        </div>

        <div class="space-y-4">

            {% for category in categories %}

            <div class="border-2 border-ink rounded-[1.5rem] p-6 bg-paper shadow-[4px_4px_0_#111]">
                <h3 class="font-display text-2xl font-bold">
                    {{ category.name }}
                </h3>
            </div>

            {% empty %}

            <div class="border-2 border-dashed border-ink rounded-[1.5rem] p-10 text-center">
                <p>Aucune catégorie</p>
            </div>

            {% endfor %}

        </div>

    </div>

</section>

{% endblock %}
